{% extends "admin/change_list.html" %}
{% load static %}

{% block result_list %}
<div style="background: white; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <h2 style="font-family: 'Playfair Display', serif; color: #1E3F35; margin-bottom: 25px; font-size: 1.8rem;">Аналитика продаж KÓTI</h2>

    <div style="display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;">
        <div style="padding: 20px 25px; background: #F8F5F0; border-radius: 12px; flex: 1; min-width: 200px; border-left: 4px solid #1E3F35;">
            <div style="font-size: 13px; color: #8A847B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Общая выручка</div>
            <div style="font-size: 28px; font-weight: 700; color: #1E3F35;">{{ summary_revenue|floatformat:2 }} <span style="font-size: 16px;">руб.</span></div>
        </div>
        <div style="padding: 20px 25px; background: #F8F5F0; border-radius: 12px; flex: 1; min-width: 200px; border-left: 4px solid #8A847B;">
            <div style="font-size: 13px; color: #8A847B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Общая валовая прибыль</div>
            <div style="font-size: 28px; font-weight: 700; color: #1E3F35;">{{ summary_profit|floatformat:2 }} <span style="font-size: 16px;">руб.</span></div>
        </div>
    </div>

    <div style="height: 400px; width: 100%;">
        <canvas id="financeChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('financeChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{ chart_labels|safe }},
            datasets: [
                {
                    label: 'Выручка (Оборот)',
                    data: {{ chart_revenue|safe }},
                    backgroundColor: '#1E3F35',
                    borderRadius: 6,
                    barPercentage: 0.6
                },
                {
                    label: 'Валовая прибыль (Чистыми)',
                    data: {{ chart_profit|safe }},
                    backgroundColor: '#8A847B',
                    borderRadius: 6,
                    barPercentage: 0.6
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top', labels: { font: { family: "'Arial', sans-serif", size: 13 } } }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: '#F1ECE3' } },
                x: { grid: { display: false } }
            }
        }
    });
</script>

{{ block.super }}
{% endblock %}
